<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="100%" height="100%">
  <defs>
    <!-- Background Glows -->
    <radialGradient id="glowPink" cx="50%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#FF2A5F" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0D1117" stop-opacity="0" />
    </radialGradient>
    
    <radialGradient id="glowCyan" cx="50%" cy="80%" r="55%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#0D1117" stop-opacity="0" />
    </radialGradient>

    <!-- Brand Main Gradient for Quill -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF2A5F" />
      <stop offset="45%" stop-color="#9A33FF" />
      <stop offset="100%" stop-color="#00E5FF" />
    </linearGradient>

    <!-- Spine Inner Glow -->
    <linearGradient id="spineGrad" x1="0" y1="-75" x2="0" y2="55" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.0" />
    </linearGradient>

    <!-- Multi-layered Modern Drop Shadow -->
    <filter id="quillShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#FF2A5F" flood-opacity="0.25"/>
      <feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#00E5FF" flood-opacity="0.15"/>
    </filter>

    <!-- Mask to create Feather Barbs, Nib Slit, and Breather Hole -->
    <mask id="quillMask">
      <!-- White base (keeps everything) -->
      <rect x="-200" y="-200" width="400" height="400" fill="white" />
      
      <!-- Breather Hole -->
      <circle cx="0" cy="70" r="10" fill="black" />
      
      <!-- Nib Slit -->
      <rect x="-2" y="70" width="4" height="115" fill="black" />
      
      <!-- Left Feather Barbs (angled as Markdown slashes) -->
      <path d="M -150 10 L -30 -60" stroke="black" stroke-width="10" stroke-linecap="round" />
      <path d="M -130 70 L -40 20" stroke="black" stroke-width="8" stroke-linecap="round" />
      
      <!-- Right Feather Barbs -->
      <path d="M 150 -10 L 40 -70" stroke="black" stroke-width="10" stroke-linecap="round" />
      <path d="M 120 60 L 30 10" stroke="black" stroke-width="8" stroke-linecap="round" />
    </mask>

    <!-- Reusable Sparkle Path -->
    <g id="sparkle">
      <path d="M 0 -15 C 0 -4, 4 0, 15 0 C 4 0, 0 4, 0 15 C 0 4, -4 0, -15 0 C -4 0, 0 -4, 0 -15 Z" />
    </g>
  </defs>

  <!-- Base Dark Canvas -->
  <rect width="100%" height="100%" fill="#0D1117" />
  
  <!-- Ambient Presentation Lighting -->
  <rect width="100%" height="100%" fill="url(#glowPink)" />
  <rect width="100%" height="100%" fill="url(#glowCyan)" />

  <!-- Decorative Sparkles -->
  <g transform="translate(420, 140) scale(0.9)">
    <use href="#sparkle" fill="#00E5FF" opacity="0.8" />
  </g>
  <g transform="translate(180, 310) scale(0.6)">
    <use href="#sparkle" fill="#FF2A5F" opacity="0.8" />
  </g>

  <!-- Logo Mark: The M-Quill (Feather + Nib + Markdown 'M' and Down Arrow) -->
  <g filter="url(#quillShadow)" transform="translate(300, 240) rotate(-45) scale(0.9)">
    <!-- Main Sweeping Feather/Shield Body -->
    <path 
      d="M 0 -80 
         L -80 -140 
         C -150 -40, -60 100, 0 180 
         C 60 100, 150 -40, 80 -140 
         Z" 
      fill="url(#brandGrad)" 
      mask="url(#quillMask)" 
    />
    
    <!-- Luminous Central Spine -->
    <line 
      x1="0" y1="-75" 
      x2="0" y2="55" 
      stroke="url(#spineGrad)" 
      stroke-width="4" 
      stroke-linecap="round" 
    />
  </g>

  <!-- Typography (Centered below the mark) -->
  <text 
    x="300" 
    y="470" 
    text-anchor="middle"
    font-family="'Inter', 'Montserrat', system-ui, -apple-system, sans-serif" 
    font-size="100" 
    font-weight="800" 
    fill="#FFFFFF" 
    letter-spacing="-3">
    Quill<tspan fill="#00E5FF" font-weight="600" font-size="70" dx="6" letter-spacing="0">.md</tspan>
  </text>
</svg>